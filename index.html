function Bdg({children,color=A.t,bg,small}){return <span style={{display:"inline-flex",alignItems:"center",gap:3,background:bg||color+"18",color,border:`1px solid ${color}30`,borderRadius:20,padding:small?"2px 8px":"4px 10px",fontSize:small?11:12,fontWeight:600,whiteSpace:"nowrap"}}>{children}</span>;}
function RBdg({level,large}){const m=RM[level]||RM.low;return <span style={{display:"inline-flex",alignItems:"center",gap:5,background:m.bg,color:m.color,border:`1.5px solid ${m.color}40`,borderRadius:8,padding:large?"6px 14px":"4px 10px",fontSize:large?14:12,fontWeight:700}}>{m.dot} {m.label}</span>;}
function SL({c,T}){return <p style={{fontSize:11,fontWeight:700,color:T.tu,textTransform:"uppercase",letterSpacing:"0.08em",margin:"0 0 8px"}}>{c}</p>;}

async function aiCall(sys,msg,tok=900){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:tok,system:sys,messages:[{role:"user",content:msg}]})});
  const d=await r.json();
  return JSON.parse((d.content?.map(c=>c.text||"").join("")||"").replace(/```json|```/g,"").trim());
}

function Scan({T,setD}){
  const[ean,setE]=useState("");const[load,setLoad]=useState(false);const[err,setErr]=useState(null);const[cam,setCam]=useState(false);const[scanning,setScanning]=useState(false);const[hint,setHint]=useState("");
  const vRef=useRef(null);const readerRef=useRef(null);const streamRef=useRef(null);

  async function startCam(){
    setErr(null);setHint("");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
      streamRef.current=stream;
      if(vRef.current)vRef.current.srcObject=stream;
      setCam(true);
      // Start ZXing barcode reader after video loads
      setTimeout(()=>startZXing(),800);
    }catch(e){setErr("Kamera nicht verfügbar — bitte EAN manuell eingeben.");}
  }

  function startZXing(){
    if(!window.ZXing||!vRef.current)return;
    setScanning(true);
    setHint("Barcode in den Rahmen halten…");
    try{
      const hints=new Map();
      const formats=[window.ZXing.BarcodeFormat.EAN_13,window.ZXing.BarcodeFormat.EAN_8,window.ZXing.BarcodeFormat.CODE_128,window.ZXing.BarcodeFormat.UPC_A];
      hints.set(window.ZXing.DecodeHintType.POSSIBLE_FORMATS,formats);
      const reader=new window.ZXing.BrowserMultiFormatReader(hints);
      readerRef.current=reader;
      reader.decodeFromVideoElement(vRef.current,(result,err2)=>{
        if(result){
          const code=result.getText();
          setHint("✓ Barcode erkannt: "+code);
          stopCam();
          lookup(code);
        }
      });
    }catch(e){setHint("Scanner bereit — oder EAN unten eingeben");}
  }

  function stopCam(){
    readerRef.current?.reset();
    streamRef.current?.getTracks().forEach(t=>t.stop());
    setCam(false);setScanning(false);setHint("");
  }
  useEffect(()=>()=>{readerRef.current?.reset();streamRef.current?.getTracks().forEach(t=>t.stop());},[]);

  async function lookup(code){
    const c=code.trim();if(!c)return;

      const cached=JSON.parse(localStorage.getItem("kc_cache")||"[]").find(x=>x.id==="scan-"+c);

      // Open Food Facts — use HTTPS with no-cors fallback
      let pn="",bn="";
      try{
        const off=await fetch(`https://world.openfoodfacts.org/api/v2/product/${c}?fields=product_name,brands`,{headers:{"User-Agent":"KonzernCheck/1.0"}});
        if(off.ok){const od=await off.json();pn=od.product?.product_name||"";bn=od.product?.brands||"";}

      );
      r.id="scan-"+c;if(!r.brand&&pn)r.brand=pn;if(!r.brand&&bn)r.brand=bn;
      const cache=JSON.parse(localStorage.getItem("kc_cache")||"[]").filter(x=>x.id!==r.id);

  }

        </div>
        {hint&&<div style={{position:"absolute",top:14,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,0.7)",color:"white",fontSize:12,padding:"6px 14px",borderRadius:20,whiteSpace:"nowrap"}}>{hint}</div>}
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:10,background:"rgba(0,0,0,0.65)",display:"flex",gap:7}}>
          <input placeholder="Oder EAN eingeben…" value={ean} onChange={e=>setE(e.target.value)} onKeyDown={e=>e.key==="Enter"&&lookup(ean)} style={{flex:1,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"8px 10px",color:"white",fontSize:13}}/>
          <button onClick={()=>lookup(ean)} style={{background:A.t,color:"white",border:"none",borderRadius:8,padding:"8px 12px",fontWeight:700,cursor:"pointer"}}>OK</button>
          <button onClick={stopCam} style={{background:"rgba(255,255,255,0.15)",color:"white",border:"none",borderRadius:8,padding:"8px 10px",cursor:"pointer"}}>✕</button>
        </div>

      <p style={{color:T.tu,fontSize:11,textAlign:"center",marginTop:8}}>Barcode automatisch erkennen oder EAN unten eingeben</p>

  return(<div>

    </div>

      <input value={ean} onChange={e=>setE(e.target.value)} onKeyDown={e=>e.key==="Enter"&&lookup(ean)} placeholder="EAN-Barcode eingeben (z.B. 4005808311804)…" style={{flex:1,background:T.sa,border:`1.5px solid ${T.br}`,borderRadius:10,padding:"10px 13px",color:T.tx,fontSize:13,outline:"none"}}/>

function Search({T,setD}){
  const[q,setQ]=useState("");const[load,setLoad]=useState(false);const[err,setErr]=useState(null);
  async function search(){if(!q.trim())return;setLoad(true);setErr(null);try{const r=await aiCall(`Konzern-Assistent. NUR JSON:\n{"brand":"","parent":"","flag":"🇩🇪","hq":{"city":"","country":"","lat":0,"lng":0},"desc":"","rev":"","brands":[],"tags":[],"risk":"low|medium|high","issues":[{"t":"environment|political|corporate|labor|social","l":"","s":"high|medium|low"}],"sites":[{"name":"","city":"","country":"","lat":0,"lng":0,"product":""}],"sources":[{"t":"science|ngo|report|news","title":"","info":"","url":""}]}`,`Recherchiere: "${q}"`);r.id="ai-"+Date.now();setD(r);}catch{setErr("Recherche fehlgeschlagen.");}setLoad(false);}
  return(<div>
    <div style={{background:A.bl,border:`1px solid ${A.b}30`,borderRadius:12,padding:16,marginBottom:18,display:"flex",gap:12,alignItems:"flex-start"}}><span style={{fontSize:24}}>🤖</span><div><p style={{color:A.b,fontWeight:700,fontSize:13,margin:"0 0 3px"}}>KI-Konzernrecherche</p><p style={{color:"#1D4ED8",fontSize:12,margin:0,lineHeight:1.5}}>Marke eingeben — KI analysiert Eigentümerstruktur und bekannte Probleme.</p></div></div>
    <div style={{display:"flex",gap:7,marginBottom:10}}><input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()} placeholder="z.B. Alpro, Barilla, Unilever…" style={{flex:1,background:T.sa,border:`1.5px solid ${T.br}`,borderRadius:10,padding:"10px 13px",color:T.tx,fontSize:13,outline:"none"}}/><button onClick={search} disabled={load} style={{background:load?T.br:A.b,color:"white",border:"none",borderRadius:10,padding:"10px 16px",fontSize:12,fontWeight:700,cursor:load?"default":"pointer"}}>{load?"🔍…":"Suchen"}</button></div>
    {err&&<p style={{color:A.r,fontSize:12,padding:"9px 12px",background:A.rl,borderRadius:8}}>{err}</p>}
    <p style={{color:T.tu,fontSize:11,lineHeight:1.7}}>⚠️ KI-Ergebnisse immer gegen Primärquellen prüfen: <strong>Earthsight</strong>, <strong>WWF</strong>.</p>
  </div>);
}

const NAV=[{id:"home",i:"🏠",l:"Start"},{id:"lib",i:"📚",l:"Bibliothek"},{id:"scan",i:"📷",l:"Scannen"},{id:"news",i:"📰",l:"News"},{id:"more",i:"⋯",l:"Mehr"}];
const MORE=[{id:"season",i:"🥦",l:"Saison",d:"Regional & frisch"},{id:"compare",i:"⚖️",l:"Vergleich",d:"Nebeneinander"},{id:"cache",i:"💾",l:"Offline",d:"Gescannte Scans"},{id:"report",i:"📬",l:"Melden",d:"Fund einreichen"},{id:"search",i:"🔬",l:"KI-Suche",d:"KI-gestützt"}];
const PT={home:"",lib:"",scan:"Produkt scannen",news:"Konzern-News",season:"Saisonkalender",compare:"Vergleich",cache:"Offline-Speicher",report:"Fund melden",search:"KI-Recherche"};

function App(){
  const[dark,setDark]=useState(true);
  const T={...(dark?D:L)};
  const[nav,setNav]=useState("home");
  const[detail,setDetail]=useState(null);
  const[more,setMore]=useState(false);
  const[favs,setFavs]=useState(()=>{try{return JSON.parse(localStorage.getItem("kc_favs")||"[]");}catch{return[];}});
  useEffect(()=>{try{localStorage.setItem("kc_favs",JSON.stringify(favs));}catch{}},[favs]);
  function toggleFav(id){setFavs(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id]);}
  function go(id){setNav(id);setMore(false);setDetail(null);}
  const cLen=JSON.parse(localStorage.getItem("kc_cache")||"[]").length;
  const isMain=nav==="home"||nav==="lib";
  useEffect(()=>{document.body.style.background=T.bg;},[dark]);

  return(
    <div style={{minHeight:"100vh",background:T.bg}}>
      <div style={{maxWidth:680,margin:"0 auto",padding:"0 13px 90px"}}>
        <div style={{padding:"16px 0 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {(detail||!isMain)&&<button onClick={()=>{if(detail)setDetail(null);else go("home");}} style={{background:"none",border:"none",color:T.tm,fontSize:17,cursor:"pointer",padding:"0 4px 0 0"}}>←</button>}
            <div>
              <h1 style={{margin:0,fontSize:18,fontWeight:800,color:T.tx,letterSpacing:"-0.02em"}}>{detail?detail.brand:isMain?<><span style={{color:A.t}}>Konzern</span>Check</>:PT[nav]||"KonzernCheck"}</h1>
              {!detail&&isMain&&<p style={{margin:"1px 0 0",fontSize:11,color:T.tu}}>Transparenz für den Einkauf</p>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {cLen>0&&!detail&&<span style={{background:T.sa,border:`1px solid ${T.br}`,borderRadius:20,padding:"3px 9px",fontSize:10,color:T.tu,fontWeight:600}}>💾 {cLen}</span>}
            <button onClick={()=>setDark(d=>!d)} style={{background:T.sf,border:`1px solid ${T.br}`,borderRadius:20,padding:"5px 10px",fontSize:12,color:T.tm,cursor:"pointer",fontWeight:600}}>{dark?"☀️":"🌙"}</button>
          </div>
        </div>

        {detail?<Detail entry={detail} onBack={()=>setDetail(null)} favs={favs} toggleFav={toggleFav} T={T}/>
        :nav==="home"?<Home T={T} go={go} setD={setDetail}/>
        :nav==="lib"?<Lib T={T} setD={setDetail} favs={favs} toggleFav={toggleFav}/>
        :nav==="scan"?<Scan T={T} setD={setDetail}/>
        :nav==="news"?<NewsView T={T}/>
        :nav==="season"?<SeasonView T={T}/>
        :nav==="compare"?<Compare T={T} setD={setDetail}/>
        :nav==="cache"?<Cache T={T} setD={setDetail}/>
        :nav==="report"?<Report T={T}/>
        :<Search T={T} setD={setDetail}/>}
      </div>

      {more&&(<>
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:150}} onClick={()=>setMore(false)}/>
        <div style={{position:"fixed",bottom:65,left:"50%",transform:"translateX(-50%)",width:"min(440px,94vw)",background:T.sf,border:`1px solid ${T.br}`,borderRadius:16,padding:10,zIndex:160,display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
          {MORE.map(n=>(<button key={n.id} onClick={()=>go(n.id)} style={{background:nav===n.id?A.tl:T.sa,border:`1px solid ${nav===n.id?A.t:T.br}`,borderRadius:11,padding:"12px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:9}}>
            <span style={{fontSize:20}}>{n.i}</span>
            <div style={{textAlign:"left"}}><p style={{margin:0,fontWeight:700,fontSize:12,color:T.tx}}>{n.l}</p><p style={{margin:0,fontSize:10,color:T.tu}}>{n.id==="cache"?`${cLen} gespeichert`:n.d}</p></div>
          </button>))}
        </div>
      </>)}

      {!detail&&(<div style={{position:"fixed",bottom:0,left:0,right:0,background:T.nb,backdropFilter:"blur(14px)",borderTop:`1px solid ${T.nb2}`,display:"flex",justifyContent:"center",padding:"5px 0 max(7px,env(safe-area-inset-bottom))",zIndex:100}}>
        <div style={{display:"flex",gap:2,maxWidth:490,width:"100%",padding:"0 7px"}}>
          {NAV.map(n=>(<button key={n.id} onClick={()=>n.id==="more"?setMore(m=>!m):go(n.id)} style={{flex:1,background:(n.id==="more"?more:nav===n.id)?A.tl:"transparent",border:`1px solid ${(n.id==="more"?more:nav===n.id)?A.t+"50":"transparent"}`,borderRadius:10,padding:"5px 3px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:17}}>{n.i}</span>
            <span style={{fontSize:9,fontWeight:(n.id==="more"?more:nav===n.id)?700:500,color:(n.id==="more"?more:nav===n.id)?A.t:T.tu}}>{n.l}</span>
          </button>))}
        </div>
      </div>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
